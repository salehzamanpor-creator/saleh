<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalehStreet</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0d0d0d;
  color: white;
  scroll-behavior: smooth;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  z-index: 1000;
}

header h1 {
  color: #b84dff;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  font-size: 14px;
}

nav a:hover {
  color: #b84dff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px 50px;
}

.hero h2 {
  font-size: 40px;
  color: #b84dff;
}

.btn {
  background: linear-gradient(45deg, purple, violet);
  padding: 15px 25px;
  border-radius: 15px;
  display: inline-block;
  margin-top: 20px;
  color: white;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid purple;
  padding: 20px;
  border-radius: 20px;
  width: 250px;
}

/* FLOAT BUTTON */
.float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: purple;
  padding: 15px;
  border-radius: 50%;
}
</style>
</head>

<body>

<header>
  <h1>SalehStreet</h1>
  <nav>
    <a href="#home">خانه</a>
    <a href="#services">خدمات</a>
    <a href="#about">درباره من</a>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="hero">
  <h2>طراحی حرفه‌ای بنر</h2>
  <p>طراحی خاص برای کسب و کار شما</p>
  <a class="btn" href="https://t.me/salehstreet">ثبت سفارش</a>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>خدمات</h2>
  <div class="cards">
    <div class="card">ساخت عکس</div>
    <div class="card">ادیت عکس</div>
    <div class="card">ساخت بنر تبلیغاتی</div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <h2>درباره من</h2>
  <p>
  من صالح هستم یک طراح بنر و طراح سایت  
  و هدف اول من رضایت شماست 🥰
  </p>
</section>

<!-- TELEGRAM FLOAT -->
<a href="https://t.me/salehstreet" class="float">📩</a>

</body>
</html>
